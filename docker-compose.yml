services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_HOST_PORT:-18000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.example.com}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_HOST_PORT:-18173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app_data:
